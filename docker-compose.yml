version: '3.8'
services:
  utilities:
    image: nginx:alpine
    container_name: utilities
    ports:
      - "80:80"
    volumes:
      - ./src:/usr/share/nginx/html:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    restart: unless-stopped
